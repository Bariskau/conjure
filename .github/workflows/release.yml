name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Build backend
        shell: bash
        run: cargo build --release --bin conjure --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          target="${{ matrix.target }}"
          package="conjure-$target"
          mkdir -p "package/$package/bin" "package/$package/frontend" artifacts

          binary="target/$target/release/conjure"
          if [ "$RUNNER_OS" = "Windows" ]; then
            binary="$binary.exe"
          fi

          cp "$binary" "package/$package/bin/"
          cp -R frontend/dist/. "package/$package/frontend/"
          if command -v xattr >/dev/null 2>&1; then
            xattr -cr "package/$package" || true
          fi

          if find "package/$package" \( -name "*.db" -o -name "*.sqlite" -o -name "*.sqlite3" \) | grep -q .; then
            echo "Database files must not be included in release packages."
            exit 1
          fi

          COPYFILE_DISABLE=1 tar -C package -czf "artifacts/$package.tar.gz" "$package"

          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "artifacts/$package.tar.gz" > "artifacts/$package.tar.gz.sha256"
          else
            sha256sum "artifacts/$package.tar.gz" > "artifacts/$package.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: conjure-${{ matrix.target }}
          path: artifacts/*

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
